services:
  db:
    container_name: edgarfeed-db
    image: postgres:latest
    environment:
      POSTGRES_DB: edgarfeed
      POSTGRES_USER: edgarfeed-user
      POSTGRES_PASSWORD: edgarfeed
      PGDATA: /data/postgres
    volumes:
      - db:/data/postgres
    ports:
      - "5332:5432"
    networks:
      - db
    restart: unless-stopped

networks:
  db:
    driver: bridge
volumes:
  db: